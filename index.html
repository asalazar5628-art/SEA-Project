<!doctype html>
<html>
  <head>
    <title>FIFA 2012 FUT | Home</title>
    <meta name="description" content="FIFA 2012 FUT player catalog" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <div class="header-overlay">
        <p class="eyebrow">EA SPORTS • FIFA 12</p>
        <h1 class="title">Ultimate Teams</h1>
      </div>
    </header>

    <div class="controls">
      <button onclick="goBack()">← Left</button>
      <button onclick="goToNext()">Right →</button>
    </div>

    <input type="text" id="search-input" placeholder="Search for a player" />
    <button onclick="searchForPlayer()">confirm</button>

    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>Player Name</h2>
        <img src="" alt="Soccer player card" />
        <ul>
          <li>Height: </li>
          <li>Position: </li>
          <li>Rating: </li>
          <li>Pacing: </li>
          <li>Dribbling: </li>
          <li>Shooting: </li>
          <li>Defense: </li>
          <li>Passing: </li>
          <li>Physicality: </li>
        </ul>
      </div>
    </div>
    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div>
  </body>
</html>
